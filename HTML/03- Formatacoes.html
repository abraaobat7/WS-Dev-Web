<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações</title>
</head>
<body>
    Primeira Linha<br>Segunda Linha<br>
    <strong>Texto em negrito semântico</strong><br>
    <b>Texto em negrito sem semântica</b><br>
 
    <em>Texto em tálico semântico</em><br>
    <i>Texto em itálico sem semântica</i><br>
 
    <del>Texto tachado semântico</del><br>
    <s>Texto tachado sem semântico</s><br>
 
    <u>Texto sublinhado</u><br>
    X<sup>2</sup><br>
    H<sub>2</sub>O<br>
    <code>console.log("Hello World!!!");</code><br>
    <blockquote>Citação em bloco</blockquote><br>
    <q>Citação curta</q><br>
</body>
</html>
