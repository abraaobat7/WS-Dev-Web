<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="/" method="post">
        <h2>Dados pessoais</h2>
        <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" required>
        <br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email" placeholder="exemplo@exemplo.com" required>
        <br>
        <label for="tipo-consulta">Tipo de Consulta</label>
        <select name="consulta" id="consulta" required>
            <option value="" selected disabled>Selecione...</option>
            <option value="suporte">Suporte</option>
            <option value="finaceiro">Financeiro</option>
            <option value="outro">Outro</option>
        </select>
        <br>
        <label for="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="mensagem" rows="5" cols="40" placeholder="Digite uma mensagem"></textarea>
        <br>
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
